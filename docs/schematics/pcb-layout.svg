<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="sans-serif">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a472a"/>
      <stop offset="50%" stop-color="#1e5631"/>
      <stop offset="100%" stop-color="#1a472a"/>
    </linearGradient>
    <linearGradient id="pad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffb800"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>

  <text x="500" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">PCB 布局参考图 — 负氧离子呼吸器主控板</text>
  <text x="500" y="43" text-anchor="middle" font-size="10" fill="#999">双层板 1.6mm FR-4 · 尺寸 100mm × 80mm</text>

  <!-- ====== PCB 基板 ====== -->
  <rect x="80" y="65" width="700" height="560" rx="10" fill="url(#board)" stroke="#0d2818" stroke-width="3" filter="url(#shadow)"/>

  <!-- ====== 安装孔 ====== -->
  <circle cx="105" cy="90" r="9" fill="#0d2818" stroke="#ffd700" stroke-width="1.5"/>
  <circle cx="105" cy="90" r="5" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  <text x="105" y="82" text-anchor="middle" font-size="6" fill="#ffd700">M3</text>

  <circle cx="755" cy="90" r="9" fill="#0d2818" stroke="#ffd700" stroke-width="1.5"/>
  <circle cx="755" cy="90" r="5" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  <text x="755" y="82" text-anchor="middle" font-size="6" fill="#ffd700">M3</text>

  <circle cx="105" cy="600" r="9" fill="#0d2818" stroke="#ffd700" stroke-width="1.5"/>
  <circle cx="105" cy="600" r="5" fill="none" stroke="#ffd700" stroke-width="0.5"/>

  <circle cx="755" cy="600" r="9" fill="#0d2818" stroke="#ffd700" stroke-width="1.5"/>
  <circle cx="755" cy="600" r="5" fill="none" stroke="#ffd700" stroke-width="0.5"/>

  <!-- ====== 区域划分 ====== -->

  <!-- 电源区 (左上) -->
  <rect x="120" y="100" width="200" height="120" rx="8" fill="none" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="130" y="115" font-size="9" fill="#e74c3c" font-weight="bold">A. 电源区</text>

  <!-- 电源端子 -->
  <rect x="140" y="125" width="60" height="30" rx="4" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="170" y="137" text-anchor="middle" font-size="7" fill="#fff">12V IN</text>
  <text x="170" y="150" text-anchor="middle" font-size="6" fill="#aaa">端子 5.08</text>

  <!-- LM2596 -->
  <rect x="220" y="125" width="45" height="30" rx="3" fill="#444" stroke="#f39c12" stroke-width="1.2"/>
  <text x="242" y="137" text-anchor="middle" font-size="6" fill="#f39c12">LM2596</text>
  <text x="242" y="150" text-anchor="middle" font-size="5" fill="#aaa">12V→5V</text>

  <!-- AMS1117 -->
  <rect x="270" y="125" width="35" height="30" rx="3" fill="#444" stroke="#2980b9" stroke-width="1"/>
  <text x="287" y="137" text-anchor="middle" font-size="5" fill="#3498db">AMS</text>
  <text x="287" y="150" text-anchor="middle" font-size="5" fill="#3498db">1117</text>

  <!-- 滤波电容 -->
  <circle cx="155" cy="185" r="10" fill="none" stroke="#999" stroke-width="1"/>
  <text x="155" y="188" text-anchor="middle" font-size="6" fill="#ccc">100μF</text>
  <circle cx="195" cy="185" r="7" fill="none" stroke="#999" stroke-width="0.8"/>
  <text x="195" y="188" text-anchor="middle" font-size="5" fill="#ccc">100n</text>

  <!-- 4G DCDC -->
  <rect x="220" y="170" width="40" height="25" rx="3" fill="#444" stroke="#9b59b6" stroke-width="1"/>
  <text x="240" y="182" text-anchor="middle" font-size="5" fill="#9b59b6">DCDC</text>
  <text x="240" y="192" text-anchor="middle" font-size="5" fill="#9b59b6">3.8V/2A</text>

  <!-- MCU 区 (中央) -->
  <rect x="340" y="100" width="200" height="140" rx="8" fill="none" stroke="#3498db" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="350" y="115" font-size="9" fill="#4fc3f7" font-weight="bold">B. 主控区</text>

  <!-- ESP32 模块 -->
  <rect x="370" y="125" width="140" height="80" rx="6" fill="#111" stroke="#4fc3f7" stroke-width="2"/>
  <text x="440" y="155" text-anchor="middle" font-size="10" fill="#4fc3f7" font-weight="bold">ESP32-WROOM-32E</text>
  <text x="440" y="172" text-anchor="middle" font-size="7" fill="#90a4ae">Wi-Fi · BT · 240MHz</text>
  <text x="440" y="188" text-anchor="middle" font-size="7" fill="#90a4ae">4MB Flash · PCB 天线</text>

  <!-- 天线区域警告 -->
  <rect x="510" y="130" width="25" height="20" rx="2" fill="none" stroke="#f1c40f" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="522" y="137" text-anchor="middle" font-size="5" fill="#f1c40f">天线</text>
  <text x="522" y="148" text-anchor="middle" font-size="5" fill="#f1c40f">禁铜</text>

  <!-- BOOT/RST 按钮 -->
  <rect x="370" y="215" width="30" height="18" rx="3" fill="#444" stroke="#666" stroke-width="1"/>
  <text x="385" y="227" text-anchor="middle" font-size="6" fill="#ccc">BOOT</text>
  <rect x="410" y="215" width="30" height="18" rx="3" fill="#444" stroke="#666" stroke-width="1"/>
  <text x="425" y="227" text-anchor="middle" font-size="6" fill="#ccc">EN</text>

  <!-- 功率区 (右上) -->
  <rect x="560" y="100" width="200" height="140" rx="8" fill="none" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="570" y="115" font-size="9" fill="#e74c3c" font-weight="bold">C. 功率区 (大电流)</text>

  <!-- MOSFET -->
  <rect x="580" y="125" width="55" height="40" rx="4" fill="#444" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="607" y="142" text-anchor="middle" font-size="7" fill="#e74c3c">MOSFET</text>
  <text x="607" y="155" text-anchor="middle" font-size="6" fill="#ccc">IRF520</text>
  <text x="607" y="167" text-anchor="middle" font-size="5" fill="#f1c40f">⚠ 加散热片</text>

  <!-- 加热管端子 -->
  <rect x="660" y="125" width="70" height="30" rx="4" fill="#333" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="695" y="137" text-anchor="middle" font-size="7" fill="#e74c3c">HEATER</text>
  <text x="695" y="150" text-anchor="middle" font-size="6" fill="#aaa">12V/4A 端子</text>

  <!-- 继电器 -->
  <rect x="580" y="180" width="150" height="45" rx="5" fill="#444" stroke="#27ae60" stroke-width="1.2"/>
  <text x="655" y="198" text-anchor="middle" font-size="8" fill="#27ae60">继电器模块 2路 12V</text>
  <text x="655" y="214" text-anchor="middle" font-size="6" fill="#ccc">IN1: 负离子 · IN2: 过温保护</text>

  <!-- 传感器区 (左下) -->
  <rect x="120" y="250" width="200" height="110" rx="8" fill="none" stroke="#1abc9c" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="130" y="265" font-size="9" fill="#1abc9c" font-weight="bold">D. 传感区</text>

  <!-- NTC 分压 -->
  <rect x="140" y="275" width="50" height="20" rx="3" fill="#444" stroke="#1abc9c" stroke-width="1"/>
  <text x="165" y="289" text-anchor="middle" font-size="6" fill="#1abc9c">R 10k 1%</text>
  <rect x="200" y="275" width="50" height="20" rx="3" fill="#444" stroke="#1abc9c" stroke-width="1"/>
  <text x="225" y="289" text-anchor="middle" font-size="6" fill="#1abc9c">R 10k 1%</text>

  <!-- NTC 连接 -->
  <text x="140" y="315" font-size="7" fill="#ccc">NTC1 ──→ J1 加热管表面</text>
  <text x="140" y="330" font-size="7" fill="#ccc">NTC2 ──→ J2 出气口风道</text>
  <text x="140" y="348" font-size="6" fill="#999">XT60 2pin 端子·屏蔽线</text>

  <!-- 4G 区 (右下) -->
  <rect x="560" y="260" width="200" height="150" rx="8" fill="none" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="570" y="275" font-size="9" fill="#9b59b6" font-weight="bold">E. 4G 通信区</text>

  <!-- SIMCom -->
  <rect x="580" y="285" width="100" height="55" rx="4" fill="#444" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="630" y="305" text-anchor="middle" font-size="8" fill="#9b59b6" font-weight="bold">SIMCom</text>
  <text x="630" y="320" text-anchor="middle" font-size="8" fill="#9b59b6">A7670E</text>
  <text x="630" y="335" text-anchor="middle" font-size="6" fill="#ccc">LTE Cat.1</text>

  <!-- SIM 卡槽 -->
  <rect x="690" y="295" width="50" height="25" rx="3" fill="#444" stroke="#666" stroke-width="1"/>
  <text x="715" y="311" text-anchor="middle" font-size="7" fill="#ccc">Nano SIM</text>

  <!-- 天线 -->
  <rect x="690" y="330" width="40" height="20" rx="10" fill="none" stroke="#f1c40f" stroke-width="1.2"/>
  <text x="710" y="344" text-anchor="middle" font-size="6" fill="#f1c40f">IPEX</text>

  <!-- LED 区 (底部) -->
  <rect x="340" y="260" width="200" height="70" rx="8" fill="none" stroke="#f1c40f" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="350" y="275" font-size="9" fill="#f1c40f" font-weight="bold">F. 指示灯 + 调试</text>

  <!-- LED -->
  <circle cx="370" cy="300" r="7" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="370" y="316" text-anchor="middle" font-size="6" fill="#e74c3c">LED1</text>
  <text x="370" y="325" text-anchor="middle" font-size="5" fill="#aaa">电源</text>

  <circle cx="420" cy="300" r="7" fill="none" stroke="#27ae60" stroke-width="1.5"/>
  <text x="420" y="316" text-anchor="middle" font-size="6" fill="#27ae60">LED2</text>
  <text x="420" y="325" text-anchor="middle" font-size="5" fill="#aaa">状态</text>

  <!-- 调试口 -->
  <text x="460" y="295" font-size="7" fill="#ccc">UART0 TX/RX</text>
  <text x="460" y="310" font-size="7" fill="#ccc">(调试排针 4pin)</text>

  <!-- OLED (可选) -->
  <rect x="510" y="290" width="60" height="35" rx="3" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="540" y="305" text-anchor="middle" font-size="6" fill="#999">OLED</text>
  <text x="540" y="318" text-anchor="middle" font-size="6" fill="#999">0.96" I²C</text>

  <!-- ====== 走线指引 ====== -->
  <rect x="120" y="390" width="640" height="225" rx="8" fill="rgba(0,0,0,0.15)" stroke="#f39c12" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="130" y="408" font-size="10" fill="#f39c12" font-weight="bold">走线指引</text>

  <text x="135" y="432" font-size="8" fill="#ffd700">功率线 (12V/4A):</text>
  <line x1="250" y1="429" x2="500" y2="429" stroke="#e74c3c" stroke-width="4" opacity="0.7"/>
  <text x="510" y="432" font-size="7" fill="#f39c12">宽度 ≥2mm (2oz 铜厚)</text>

  <text x="135" y="452" font-size="8" fill="#ffd700">5V 电源线:</text>
  <line x1="250" y1="449" x2="380" y2="449" stroke="#e67e22" stroke-width="2" opacity="0.7"/>
  <text x="390" y="452" font-size="7" fill="#f39c12">≥0.5mm</text>

  <text x="135" y="472" font-size="8" fill="#ffd700">3.3V / 信号线:</text>
  <line x1="250" y1="469" x2="380" y2="469" stroke="#3498db" stroke-width="1" opacity="0.7"/>
  <text x="390" y="472" font-size="7" fill="#f39c12">≥0.25mm</text>

  <text x="135" y="492" font-size="8" fill="#ffd700">ADC 传感线:</text>
  <line x1="250" y1="489" x2="500" y2="489" stroke="#1abc9c" stroke-width="1" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="510" y="492" font-size="7" fill="#f39c12">远离功率线 · 包地 · 差分</text>

  <text x="135" y="515" font-size="8" fill="#ffd700">地平面:</text>
  <text x="250" y="515" font-size="7" fill="#ccc">底层整面铺铜 GND · 数字/功率地分区单点接地</text>

  <text x="135" y="540" font-size="8" fill="#ffd700">禁止区域:</text>
  <text x="250" y="540" font-size="7" fill="#ccc">ESP32 天线区域 (右上) 禁止铺铜 · 4G 天线区域 (右下) 禁止铺铜</text>

  <text x="135" y="562" font-size="8" fill="#ffd700">散热:</text>
  <text x="250" y="562" font-size="7" fill="#ccc">MOSFET 区域增加散热铜皮 · 加热管端子区域加粗</text>

  <text x="135" y="585" font-size="8" fill="#ffd700">板边:</text>
  <text x="250" y="585" font-size="7" fill="#ccc">距板边 ≥2mm 禁布元件 · 安装孔周围 ≥5mm 禁布</text>

  <!-- ====== 尺寸标注 ====== -->
  <!-- 水平标尺 -->
  <line x1="80" y1="645" x2="780" y2="645" stroke="#ffd700" stroke-width="1"/>
  <line x1="80" y1="640" x2="80" y2="650" stroke="#ffd700" stroke-width="1"/>
  <line x1="780" y1="640" x2="780" y2="650" stroke="#ffd700" stroke-width="1"/>
  <text x="430" y="660" text-anchor="middle" font-size="10" fill="#ffd700">100mm</text>

  <!-- 垂直标尺 -->
  <line x1="60" y1="65" x2="60" y2="625" stroke="#ffd700" stroke-width="1"/>
  <line x1="55" y1="65" x2="65" y2="65" stroke="#ffd700" stroke-width="1"/>
  <line x1="55" y1="625" x2="65" y2="625" stroke="#ffd700" stroke-width="1"/>
  <text x="48" y="350" text-anchor="middle" font-size="10" fill="#ffd700" transform="rotate(-90,48,350)">80mm</text>

  <!-- ====== 层叠说明 ====== -->
  <rect x="120" y="680" width="640" height="55" rx="6" fill="#16213e" stroke="#2a3f5f" stroke-width="1"/>
  <text x="440" y="700" text-anchor="middle" font-size="9" fill="#4fc3f7">层叠结构:  顶层 (信号+功率) ── FR-4 1.6mm ── 底层 (GND 铺铜)</text>
  <text x="440" y="720" text-anchor="middle" font-size="8" fill="#90a4ae">铜厚 1oz (信号) / 2oz (功率区) · 绿油阻焊 · 白色丝印 · HASL 喷锡</text>

  <text x="950" y="780" text-anchor="end" font-size="9" fill="#bdc3c7">v1.0 · 2026-05-24</text>
</svg>
