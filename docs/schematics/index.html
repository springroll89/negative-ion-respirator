<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>负氧离子呼吸器 — 电路图纸</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#1a1a2e; color:#e0e0e0; }
  header { padding:32px 24px 16px; text-align:center; }
  header h1 { font-size:22px; color:#fff; }
  header p { font-size:14px; color:#90a4ae; margin-top:6px; }
  .tabs { display:flex; justify-content:center; gap:8px; padding:12px 24px; flex-wrap:wrap; }
  .tabs button { padding:10px 24px; border:none; border-radius:8px; cursor:pointer; font-size:14px; background:#16213e; color:#90a4ae; transition: all .2s; }
  .tabs button:hover { background:#1f3460; color:#fff; }
  .tabs button.active { background:#4fc3f7; color:#1a1a2e; font-weight:bold; }
  .viewer { text-align:center; padding:0 24px 40px; }
  .viewer img, .viewer object { max-width:100%; border-radius:8px; background:#fff; }
  iframe { width:100%; height:80vh; border:none; border-radius:8px; background:#fff; }
</style>
</head>
<body>
<header>
  <h1>负氧离子呼吸器 — 电路图纸</h1>
  <p>三张 SVG 矢量图，浏览器可直接缩放查看</p>
</header>
<div class="tabs">
  <button class="active" onclick="show('system-block')">1. 系统框图</button>
  <button onclick="show('pin-connections')">2. 引脚连接图</button>
  <button onclick="show('circuit-schematic')">3. 电路原理图</button>
</div>
<div class="viewer">
  <iframe id="frame" src="system-block.svg"></iframe>
</div>
<script>
function show(name) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('frame').src = name + '.svg';
}
</script>
</body>
</html>
